name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -c release --disable-sandbox
      - name: Test
        run: swift test --disable-sandbox
      - name: Smoke CLI
        run: |
          .build/release/meetscribe --version
          .build/release/meetscribe doctor || true
